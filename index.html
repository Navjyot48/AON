<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Art Of Nails by Prerna</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins', sans-serif;
  background:linear-gradient(180deg,#0a0a0a,#1a1a1a);
  color:#fff;
}

/* NAVBAR */
nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:rgba(255,182,193,0.08);
  backdrop-filter:blur(12px);
  z-index:1000;
}

nav h1{
  font-family:'Playfair Display';
  background:linear-gradient(90deg,#ffb6c1,#d4af37);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

nav a{
  color:#eee;
  margin-left:30px;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  background:
    radial-gradient(circle at top, rgba(255,182,193,0.2), transparent),
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,1)),
    url('Logo.jpg') center/cover no-repeat;
}

.hero h2{
  font-size:3rem;
  font-family:'Playfair Display';
}

/* BUTTON */
.btn{
  padding:12px 25px;
  background:#ffb6c1;
  color:black;
  border-radius:25px;
  text-decoration:none;
}

/* SECTION */
.section{
  padding:100px 20px;
  text-align:center;
}

.section h2{
  color:#ffb6c1;
  margin-bottom:40px;
}

/* PRODUCTS */
.services{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:30px;
}

.card{
  width:260px;
  padding:20px;
  background:rgba(255,182,193,0.05);
  border-radius:20px;
}

.card img{
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}

.card button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:20px;
  background:#ffb6c1;
  cursor:pointer;
}

/* CART */
#cart{
  max-width:400px;
  margin:20px auto;
  text-align:left;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.gallery img{
  width:100%;
  border-radius:10px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  color:#aaa;
}

</style>
</head>

<body>

<nav>
  <h1>Art Of Nails</h1>
  <div>
    <a href="#shop">Shop</a>
    <a href="#cart-section">Cart</a>
    <a href="#gallery">Gallery</a>
  </div>
</nav>

<section class="hero">
  <div>
    <h2>Luxury Press-On Nails</h2>
    <br>
    <a href="#shop" class="btn">Shop Now</a>
  </div>
</section>

<!-- SHOP -->
<section class="section" id="shop">
  <h2>Shop Nails</h2>
  <div class="services">

    <div class="card">
      <img src="1.jpeg">
      <h3>Minimal Nails</h3>
      <p>₹499</p>
      <button onclick="addToCart('Minimal Nails',499)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="2.jpeg">
      <h3>Bridal Luxury</h3>
      <p>₹1299</p>
      <button onclick="addToCart('Bridal Luxury',1299)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="3.jpeg">
      <h3>Trendy Designs</h3>
      <p>₹799</p>
      <button onclick="addToCart('Trendy Designs',799)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="4.jpeg">
      <h3>Custom Set</h3>
      <p>₹999</p>
      <button onclick="addToCart('Custom Set',999)">Add to Cart</button>
    </div>

  </div>
</section>

<!-- CART -->
<section class="section" id="cart-section">
  <h2>Your Cart</h2>
  <div id="cart"></div>
  <h3 id="total"></h3>
  <button onclick="checkout()">Checkout on WhatsApp</button>
</section>

<!-- GALLERY -->
<section class="section" id="gallery">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="5.jpeg">
    <img src="6.jpeg">
    <img src="7.jpeg">
    <img src="8.jpeg">
  </div>
</section>

<script>

let cart = [];

function addToCart(name, price){
  cart.push({name, price});
  updateCart();
}

function updateCart(){
  let cartHTML = "";
  let total = 0;

  cart.forEach((item, index)=>{
    total += item.price;
    cartHTML += `
      <p>${item.name} - ₹${item.price} 
      <button onclick="removeItem(${index})">❌</button></p>
    `;
  });

  document.getElementById("cart").innerHTML = cartHTML;
  document.getElementById("total").innerText = "Total: ₹" + total;
}

function removeItem(index){
  cart.splice(index,1);
  updateCart();
}

function checkout(){

  if(cart.length === 0){
    alert("Cart is empty!");
    return;
  }

  let message = "Hello, I want to order:%0A";

  cart.forEach(item=>{
    message += `${item.name} - ₹${item.price}%0A`;
  });

  const total = cart.reduce((sum,item)=>sum+item.price,0);
  message += `%0ATotal: ₹${total}`;

  const phone = "91XXXXXXXXXX"; // PUT YOUR NUMBER

  window.open(`https://wa.me/${phone}?text=${message}`,"_blank");
}

</script>

<footer>
  <p>Email: artofnails4@gmail.com</p>
</footer>

</body>
</html>
